<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>🚀 1 Million Shares Challenge – LIG1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Teile und gewinne 1,000,000 LIG1. Kauf nur mit POL auf Uniswap Polygon." />

<meta property="og:title" content="🚀 1 Million Shares Challenge" />
<meta property="og:description" content="Teile und sichere dir die Chance auf 1,000,000 LIG1." />
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

.counter {
  font-size: 28px;
  font-weight: bold;
  margin: 15px 0;
}

.jackpot {
  font-size: 22px;
  font-weight: bold;
}

.price {
  font-size: 13px;
  color: #666;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.main {
  background: #5b7cff;
  color: white;
}

.confirm {
  background: #00c853;
  color: white;
}

.hidden {
  display: none;
}

.buy {
  display: block;
  margin-top: 10px;
  background: #00c853;
  color: white;
  padding: 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}

.goal {
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 1 Million Shares</h1>

<p><b>💰 Gewinne 1,000,000 LIG1</b></p>

<div class="jackpot">
💰 1,000,000 LIG1 ≈ <span id="usd">$0.00</span>
</div>

<div class="price" id="price">
1 LIG1 ≈ $0.00000000
</div>

<div class="counter" id="counter">0 Shares</div>

<div class="goal">
Noch <span id="left">1,000,000</span> bis 1 Mio 🚀
</div>

<div class="warning">
⚠️ LIG1 wird auf Uniswap (Polygon) mit POL gekauft
</div>

<a class="buy"
href="https://app.uniswap.org/#/swap?chain=polygon&outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d"
target="_blank">
→ LIG1 mit POL kaufen
</a>

<p>
👉 Teilen = Teilnahme<br>
👉 Ohne Share keine Chance
</p>

<button class="main" onclick="startShare()">
🚀 Jetzt teilen & teilnehmen
</button>

<button id="confirmBtn" class="confirm hidden" onclick="confirmShare()">
👉 Ich habe geteilt – Teilnahme aktivieren
</button>

</div>

<script>

// SUPABASE
const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

// BLOCKCHAIN
const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

const LIG1 = "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d";
const PAIR = "0xd6791279b261c36c1e079ece8cb05079cc5e7e38";

// SHARE START
function startShare() {
  const text = "🚀 1 Million Shares Challenge – Gewinne 1,000,000 LIG1!";
  const url = "https://ligone-token.github.io/ligone-web/1-mio-share.html";

  window.open(
    "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text + " " + url),
    "_blank"
  );

  document.getElementById("confirmBtn").classList.remove("hidden");
}

// CONFIRM
async function confirmShare() {
  await supabase
    .from("lig1_campaign_participants")
    .insert([{ wallet: "user_" + Date.now() }]);

  update();
}

// LIVE PREIS
async function getPrice() {
  const pair = new ethers.Contract(
    PAIR,
    [
      "function getReserves() view returns (uint112,uint112,uint32)",
      "function token0() view returns (address)"
    ],
    provider
  );

  const [r0, r1] = await pair.getReserves();
  const token0 = await pair.token0();

  let lig1Reserve, polReserve;

  if (token0.toLowerCase() === LIG1.toLowerCase()) {
    lig1Reserve = r0;
    polReserve = r1;
  } else {
    lig1Reserve = r1;
    polReserve = r0;
  }

  const pricePOL = (polReserve / 1e18) / (lig1Reserve / 1e18);

  const res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=matic-network&vs_currencies=usd",
    { cache: "no-store" }
  );

  const data = await res.json();
  return pricePOL * data["matic-network"].usd;
}

// UPDATE
async function update() {
  try {
    const { count } = await supabase
      .from("lig1_campaign_participants")
      .select("*", { count: "exact", head: true });

    const shares = count || 0;
    const left = 1000000 - shares;

    const price = await getPrice();
    const jackpotUSD = 1000000 * price;

    document.getElementById("counter").innerText =
      shares.toLocaleString() + " Shares";

    document.getElementById("left").innerText =
      left.toLocaleString();

    document.getElementById("usd").innerText =
      "$" + jackpotUSD.toFixed(2);

    document.getElementById("price").innerText =
      "1 LIG1 ≈ $" + price.toFixed(8);

  } catch (e) {
    console.error(e);
  }
}

// LIVE LOOP
setInterval(update, 8000);
update();

</script>

</body>
</html>
