<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIGONE – 1 Million Shares</title>

<meta name="description" content="1 Million Shares Challenge – 1 Wallet gewinnt 1.000.000 LIG1">

<meta property="og:title" content="🚀 1 Million Shares Challenge">
<meta property="og:description" content="1 Wallet gewinnt 1.000.000 LIG1">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">

<meta name="twitter:card" content="summary_large_image">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:#f6f8fb;
color:#111;
}

.container{
max-width:800px;
margin:30px auto;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
flex-wrap:wrap;
}

.header a{
margin-right:10px;
font-size:13px;
text-decoration:none;
color:#333;
}

/* HERO */
.hero{
text-align:center;
margin-bottom:30px;
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
color:#555;
}

/* SHARE */
.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.share button{
padding:14px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.whatsapp{background:#25D366;}
.telegram{background:#0088cc;}
.facebook{background:#1877f2;}
.x{background:#000;}

/* WALLET */
.wallet{
margin-top:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

.main{
margin-top:10px;
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}

.result{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<!-- HEADER LINKS -->
<div class="header">

<a href="https://ligone-token.github.io/ligone-web/" target="_blank">Website</a>
<a href="https://www.geckoterminal.com/polygon_pos/pools/0xd6791279b261c36c1e079ece8cb05079cc5e7e38" target="_blank">Chart</a>
<a href="https://polygonscan.com/token/0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Contract</a>
<a href="https://app.uniswap.org/#/swap?chain=polygon&outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Buy (POL)</a>
<a href="https://ligone-token.github.io/ligone-web/monitor.html" target="_blank">Monitor</a>

</div>

<!-- HERO -->
<div class="hero">

<h1>1,000,000 Shares</h1>

<p>
Wenn 1.000.000 erreicht werden,<br>
gewinnt 1 Wallet <b>1.000.000 LIG1</b>
</p>

<p><b>Teilnahme nur nach Share + Wallet + ≥100 LIG1</b></p>

</div>

<!-- SHARE BUTTONS -->
<div class="share">

<button class="whatsapp" onclick="shareWhats()">WhatsApp</button>
<button class="telegram" onclick="shareTG()">Telegram</button>
<button class="facebook" onclick="shareFB()">Facebook</button>
<button class="x" onclick="shareX()">X</button>

</div>

<!-- CONFIRM -->
<button id="confirmBtn" class="main hidden" onclick="showWallet()">
👉 Ich habe geteilt – weiter
</button>

<!-- WALLET -->
<div id="walletBox" class="wallet hidden">

<input id="wallet" placeholder="Wallet Adresse">

<button class="main" onclick="participate()">
Teilnahme starten
</button>

</div>

<!-- RESULT -->
<div id="result" class="result"></div>

</div>

<script>

// SUPABASE
const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

let shared=false;

const url = location.href;
const text = "🚀 1 Million Shares Challenge – 1 Wallet gewinnt 1M LIG1: ";

// SHARE FUNCTIONS
function shareWhats(){
window.open("https://wa.me/?text="+encodeURIComponent(text+url));
enableConfirm();
}
function shareTG(){
window.open("https://t.me/share/url?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text));
enableConfirm();
}
function shareFB(){
window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url));
enableConfirm();
}
function shareX(){
window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text+url));
enableConfirm();
}

function enableConfirm(){
shared=true;
document.getElementById("confirmBtn").classList.remove("hidden");
}

// SHOW WALLET
function showWallet(){
if(!shared){
alert("Bitte zuerst teilen!");
return;
}
document.getElementById("walletBox").classList.remove("hidden");
}

// WALLET CHECK
async function checkWallet(wallet){

const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

const contract = new ethers.Contract(
"0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
["function balanceOf(address) view returns (uint256)"],
provider
);

const balance = await contract.balanceOf(wallet);

return parseFloat(ethers.utils.formatUnits(balance,18)) >= 100;
}

// PARTICIPATE
async function participate(){

if(!shared){
alert("Ohne Share keine Teilnahme!");
return;
}

const wallet=document.getElementById("wallet").value;

if(!wallet){
alert("Wallet eingeben!");
return;
}

const valid=await checkWallet(wallet);

if(!valid){
alert("Mindestens 100 LIG1 erforderlich!");
return;
}

// INSERT
const {error}=await supabase
.from("lig1_campaign_participants")
.insert([{wallet}]);

if(error){
alert("Wallet existiert bereits oder Fehler!");
return;
}

// COUNT
const {count}=await supabase
.from("lig1_campaign_participants")
.select("*",{count:"exact",head:true});

document.getElementById("result").innerHTML =
"✅ Du bist Teilnehmer #" + count;

}

</script>

</body>
</html>
