<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIG1 Share Campaign</title>

<!-- PREVIEW -->
<meta property="og:title" content="🚀 1,000,000 SHARES">
<meta property="og:description" content="🎁 Sofort 1 LIG1 für Teilnahme">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">
<meta property="og:url" content="https://ligone-token.github.io/ligone-web/1-mio-share.html">

<style>
body{
margin:0;
font-family:Inter,system-ui;
background:#0f172a;
color:#fff;
text-align:center;
padding:40px 20px;
}

h1{
font-size:48px;
color:#facc15;
margin-bottom:10px;
}

.reward{
font-size:22px;
margin-bottom:20px;
}

.button{
background:#25D366;
color:#000;
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:bold;
border:none;
width:100%;
max-width:400px;
cursor:pointer;
}

.wallet-box{
margin-top:30px;
display:none;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:10px;
}

.claim{
background:#facc15;
margin-top:10px;
}
</style>

</head>

<body>

<h1>🚀 1,000,000 SHARES</h1>

<div class="reward">
🎁 Sofort 1 LIG1 für Teilnahme
</div>

<button class="button" onclick="startFlow()">
👉 Jetzt teilen & Reward sichern
</button>

<div class="wallet-box" id="walletBox">

<p>Wallet eingeben für Auszahlung:</p>

<input id="wallet" placeholder="0x...">

<button class="button claim" onclick="claim()">
💰 1 LIG1 erhalten
</button>

<div id="status"></div>

</div>

<script>

const url = "https://ligone-token.github.io/ligone-web/1-mio-share.html?v=1";

function startFlow(){

  // 🔥 SOFORT SHARE
  window.open(
    "https://wa.me/?text=" +
    encodeURIComponent(
      "🚀 1,000,000 SHARES!\n\n🎁 Ich habe gerade 1 LIG1 bekommen!\n\nMach mit:\n" + url
    )
  );

  // 👉 Wallet danach anzeigen
  setTimeout(()=>{
    document.getElementById("walletBox").style.display="block";
  },800);
}

function claim(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet || !wallet.startsWith("0x")){
    alert("Wallet ungültig");
    return;
  }

  document.getElementById("status").innerHTML =
  "🔥 Teilnahme registriert";

  // 👉 HIER würdest du Supabase + Auszahlung anschließen
}

</script>

</body>
</html>
