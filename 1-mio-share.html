<script>

// SHARE
function startShare() {
  const url = window.location.href;

  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent("🚀 Gewinne 1.000.000 LIG1! " + url),
    "_blank"
  );

  document.getElementById("confirmBtn").style.display = "block";
}

// WALLET CHECK
async function checkWallet(wallet) {
  try {
    const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

    const contract = new ethers.Contract(
      "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
      ["function balanceOf(address) view returns (uint256)"],
      provider
    );

    const balance = await contract.balanceOf(wallet);
    const tokens = parseFloat(ethers.utils.formatUnits(balance,18));

    return tokens >= 100;

  } catch {
    return false;
  }
}

// CONFIRM
async function confirmShare() {

  const wallet = document.getElementById("wallet").value;

  if (!wallet) return alert("Wallet eingeben!");

  const valid = await checkWallet(wallet);

  if (!valid) {
    alert("Du brauchst mindestens 100 LIG1!");
    return;
  }

  alert("Teilnahme bestätigt!");
}

// LIVE PREIS NUR COINGECKO
async function loadPrice() {
  try {

    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=matic-network&vs_currencies=usd"
    );

    const data = await res.json();

    const polUSD = data["matic-network"]?.usd;

    if (!polUSD) {
      document.getElementById("usd").innerText = "Kein Livepreis verfügbar";
      return;
    }

    // realistischer aktueller Wert aus Pool-Niveau
    const lig1USD = polUSD * 0.000017;

    const jackpot = 1000000 * lig1USD;

    document.getElementById("usd").innerText =
      "≈ $" + jackpot.toFixed(2);

  } catch {
    document.getElementById("usd").innerText = "Livepreis nicht verfügbar";
  }
}

loadPrice();

</script>
