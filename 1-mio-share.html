<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>🚀 1 Million Shares Challenge – LIG1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Teile und nimm automatisch teil – 1,000,000 LIG1 Jackpot." />

<meta property="og:title" content="🚀 1 Million Shares Challenge" />
<meta property="og:description" content="Teile und sichere dir die Chance auf 1,000,000 LIG1." />
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  max-width: 420px;
  width: 90%;
}

.counter {
  font-size: 32px;
  font-weight: bold;
  margin: 20px 0;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.main {
  background: #5b7cff;
  color: white;
}

.confirm {
  background: #00c853;
  color: white;
  margin-top: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 1 Million Shares</h1>

<p><b>💰 Gewinne 1,000,000 LIG1</b></p>

<div class="counter" id="counter">0 / 1,000,000</div>

<p>
👉 Jeder Teilnehmer muss teilen<br>
👉 Ohne Share keine Teilnahme
</p>

<button class="main" onclick="startShare()">
🚀 Jetzt teilen & teilnehmen
</button>

<button id="confirmBtn" class="confirm hidden" onclick="confirmShare()">
👉 Ich habe geteilt – Teilnahme aktivieren
</button>

</div>

<script>

// SUPABASE
const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

// SHARE START
function startShare() {

  const text = "🚀 Ich bin in der 1M LIG1 Challenge!\n\nGewinne 1,000,000 LIG1!\n👉 Mach mit:";
  const url = "https://ligone-token.github.io/ligone-web/1-mio-share.html";

  window.open(
    "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text + " " + url),
    "_blank"
  );

  // Confirm Button anzeigen
  document.getElementById("confirmBtn").classList.remove("hidden");
}

// BESTÄTIGUNG = TEILNAHME
async function confirmShare() {

  await supabase
    .from("lig1_campaign_participants")
    .insert([
      { wallet: "user_" + Date.now() }
    ]);

  update();
}

// COUNTER
async function update() {

  const { count } = await supabase
    .from("lig1_campaign_participants")
    .select("*", { count: "exact", head: true });

  document.getElementById("counter").innerText =
    (count || 0).toLocaleString() + " / 1,000,000";
}

// START
update();
setInterval(update, 10000);

</script>

</body>
</html>
