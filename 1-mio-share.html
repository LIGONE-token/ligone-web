<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIGONE – 1,000,000 Shares</title>

<meta property="og:title" content="🚀 LIGONE – 1,000,000 SHARES">
<meta property="og:description" content="Gemeinschaftliches Geldsystem – jeder kann teilnehmen">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">
<meta property="og:url" content="https://ligone-token.github.io/ligone-web/1-mio-share.html">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{
margin:0;
font-family:Inter,system-ui,sans-serif;
background:
linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
color:#111;
min-height:100vh;
}

.wrap{
max-width:700px;
margin:auto;
padding:30px 20px;
text-align:center;
}

h1{
font-size:52px;
margin-bottom:5px;
}

.sub{
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

.story{
font-size:18px;
line-height:1.5;
color:#444;
margin-bottom:25px;
}

.progress{
font-size:22px;
font-weight:bold;
}

.bar{
height:14px;
background:#ddd;
border-radius:10px;
margin:10px 0 20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#111;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.main{background:#111;color:#fff;}
.share{background:#f3f4f6;color:#111;}

.status{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🚀 LIGONE</h1>
<div class="sub">1,000,000 SHARES</div>

<div class="story">
LIGONE ist ein gemeinschaftliches Geldsystem,<br>
das niemand kontrolliert.<br><br>

Keine zentrale Macht. Jeder kann teilnehmen.<br><br>

🎁 Jeder Teilnehmer erhält LIG1<br>
🏆 1 Million Shares → 1 Wallet gewinnt 1,000,000 LIG1
</div>

<div class="progress" id="counter">Lädt...</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="card">

<input id="wallet" placeholder="0x Wallet Adresse">

<button class="main" onclick="participate()">Teilnehmen & Share</button>

<div class="status" id="status"></div>

</div>

</div>

<script>

// DEIN SETUP (unverändert)
const sb = window.supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

const TARGET = 1000000;

function setStatus(t){
document.getElementById("status").innerText = t;
}

// COUNTER
async function loadCount(){
const { count } = await sb
.from("lig1_campaign")
.select("*",{count:"exact",head:true});

const c = count || 0;

document.getElementById("counter").innerText =
c + " / 1,000,000 Shares";

document.getElementById("fill").style.width =
(c/TARGET*100)+"%";
}

// WALLET CHECK
async function checkWallet(wallet){

const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

const contract = new ethers.Contract(
"0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
["function balanceOf(address) view returns (uint256)"],
provider
);

const balance = await contract.balanceOf(wallet);
return Number(balance)/1e18;
}

// PARTICIPATE
async function participate(){

const wallet = document.getElementById("wallet").value;

if(!wallet || !wallet.startsWith("0x")){
setStatus("❌ Wallet ungültig");
return;
}

setStatus("⏳ Prüfe Wallet...");

try{

const amount = await checkWallet(wallet);

if(amount < 100){
setStatus("❌ Mindestens 100 LIG1 erforderlich");
return;
}

await sb.from("lig1_campaign").insert([{}]);

await loadCount();

setStatus("🔥 Teilnahme bestätigt");

// SHARE
window.open(
"https://wa.me/?text=" +
encodeURIComponent(
"Ich teste gerade LIGONE 👀\n\n" +
"1 Mio Shares → 1 Mio LIG1\n\n" +
"https://ligone-token.github.io/ligone-web/1-mio-share.html"
),
"_blank"
);

}catch(e){
setStatus("❌ Fehler");
}

}

loadCount();

</script>

</body>
</html>
