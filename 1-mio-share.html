<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1M Shares</title>

<meta property="og:title" content="🚀 1,000,000 SHARES">
<meta property="og:description" content="1 Wallet gewinnt 1,000,000 LIG1">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">
<meta property="og:url" content="https://ligone-token.github.io/ligone-web/1-mio-share.html">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
text-align:center;
padding:40px;
}
h1{font-size:50px;color:#facc15;}
.progress{margin-top:20px;font-size:22px;}
.bar{height:12px;background:#333;border-radius:10px;margin:10px;}
.fill{height:100%;background:#facc15;width:0%;}
button{
margin-top:10px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
.whatsapp{background:#25D366;color:#000;}
.telegram{background:#0088cc;color:#fff;}
.x{background:#111;color:#fff;}
.facebook{background:#1877f2;color:#fff;}
</style>

</head>

<body>

<h1>🚀 1,000,000 SHARES</h1>

<div class="progress" id="counter">
Lädt...
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<button class="whatsapp" onclick="shareWhats()">WhatsApp</button>
<button class="telegram" onclick="shareTG()">Telegram</button>
<button class="x" onclick="shareX()">X</button>
<button class="facebook" onclick="shareFB()">Facebook</button>

<script>

// 🔑 HIER EINTRAGEN (NUR DAS!)
const sb = window.supabase.createClient(
  "https://hwpeegcsdgxgcybuosfv.supabase.co",
  "sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

// 🔗 URL
const url = "https://ligone-token.github.io/ligone-web/1-mio-share.html?v=1";

const text =
"🚀 1,000,000 SHARES\n\n" +
"1 Wallet gewinnt 1,000,000 LIG1\n\n" +
url;

// 📊 COUNTER LADEN
async function load(){

  const { count } = await sb
    .from("lig1_campaign")
    .select("*",{count:"exact",head:true});

  const c = count || 0;

  document.getElementById("counter").innerText =
    c.toLocaleString() + " / 1,000,000 Shares";

  document.getElementById("fill").style.width =
    (c / 1000000 * 100) + "%";
}

// ➕ EINTRAG
async function add(){

  const { error } = await sb
    .from("lig1_campaign")
    .insert([{}]);

  if(error){
    console.log("Insert error:", error);
  }

  load();
}

// 📤 SHARE BUTTONS

function shareWhats(){
  add();
  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

function shareTG(){
  add();
  window.open("https://t.me/share/url?url=" + encodeURIComponent(url));
}

function shareX(){
  add();
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(text));
}

function shareFB(){
  add();
  window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url));
}

// 🔄 START
setInterval(load,5000);
load();

</script>

</body>
</html>
