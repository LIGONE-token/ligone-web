<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Shares</title>

<!-- ✅ PREVIEW (DEIN BILD) -->
<meta property="og:title" content="🚀 1,000,000 SHARES">
<meta property="og:description" content="Ich bin Teilnehmer – bist du dabei?">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">
<meta property="og:url" content="https://ligone-token.github.io/ligone-web/">
<meta property="og:type" content="website">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
:root{
--accent:#facc15;
--blue:#2563eb;
--border:#e5e7eb;
}

body{
margin:0;
font-family:Inter,system-ui;
color:#fff;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1621761191319-c6fb62004040");

background-size:cover;
background-position:center;
}

/* HEADER */
.header{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
background:rgba(0,0,0,0.6);
}

.header a{
background:#111;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
color:#fff;
font-size:13px;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:64px;
margin:0;
text-shadow:0 0 25px rgba(250,204,21,0.6);
}

.highlight{
color:var(--accent);
}

.hero p{
color:#ddd;
font-size:20px;
}

/* CARD */
.card{
max-width:600px;
margin:20px auto;
background:#fff;
color:#111;
padding:25px;
border-radius:16px;
}

/* BUTTONS */
button{
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.main{
background:var(--accent);
width:100%;
margin-top:10px;
}

.buy{
background:#16a34a;
color:#fff;
width:100%;
margin-top:15px;
}

.share{
background:var(--blue);
color:#fff;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid var(--border);
}

.result{
margin-top:15px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
<a href="https://ligone.ch" target="_blank">Website</a>
<a href="https://app.uniswap.org/#/swap?chain=polygon&outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Buy</a>
</div>

<div class="hero">
<h1><span class="highlight">1,000,000</span> SHARES</h1>
<p>1 Wallet gewinnt 1,000,000 LIG1</p>

<a href="https://ligone.ch" target="_blank">
<button class="buy">💰 LIG1 kaufen (Anleitung)</button>
</a>
</div>

<div class="card">

<p><b>💎 Teilnahme:</b> mindestens 100 LIG1</p>

<input id="wallet" placeholder="Deine Wallet Adresse">

<button class="main" onclick="participate()">Teilnahme starten</button>

<button class="share" onclick="share()">📤 Teilen</button>

<div id="result" class="result"></div>

</div>

<script>

// 🔐 Wallet Check
async function checkLIG1(wallet){

  const provider = new ethers.providers.JsonRpcProvider(
    "https://polygon-rpc.com"
  );

  const contract = new ethers.Contract(
    "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await contract.balanceOf(wallet);
  return Number(balance) / 1e18;
}

// 🚀 Teilnahme
async function participate(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet || !wallet.startsWith("0x")){
    alert("Ungültige Wallet");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Prüfe Wallet...";

  try{

    const bal = await checkLIG1(wallet);

    if(bal < 100){
      document.getElementById("result").innerHTML =
        "❌ Mindestens 100 LIG1 erforderlich";
      return;
    }

    document.getElementById("result").innerHTML =
      "🔥 Teilnahme bestätigt! Jetzt teilen 🚀";

  }catch(e){
    document.getElementById("result").innerHTML =
      "❌ Fehler bei Prüfung";
  }
}

// 📤 Share
function share(){

  const text =
  "🚀 1,000,000 LIG1 Challenge!\nMach mit:\n" + location.href;

  window.open(
    "https://twitter.com/intent/tweet?text="+encodeURIComponent(text)
  );
}

</script>

</body>
</html>
