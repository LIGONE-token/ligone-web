<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Shares</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;text-align:center}
.box{max-width:500px;margin:40px auto;background:#fff;padding:30px;border-radius:16px}
button{padding:15px;margin:5px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.main{background:#facc15}
.share{background:#2563eb;color:#fff}
input{width:100%;padding:12px;margin-top:10px}
</style>
</head>

<body>

<div class="box">

<h1>🚀 1,000,000 SHARES</h1>
<p>Gewinne 1,000,000 LIG1</p>

<p id="counter">Teilnehmer: 0</p>

<hr>

<p><b>Teilnahme:</b> ≥100 LIG1</p>

<input id="wallet" placeholder="Deine Wallet">

<button class="main" onclick="participate()">Teilnehmen</button>

<h3>Teilen & Chancen erhöhen</h3>

<button class="share" onclick="share()">📤 Jetzt teilen</button>

<p id="result"></p>

</div>

<script>

// 🔥 CONFIG
const SUPABASE_URL = "https://YOUR_URL.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔗 REFERRAL
const params = new URLSearchParams(location.search);
const ref = params.get("ref");

// 📊 COUNT
async function loadCount(){
  const { count } = await sb
    .from("participants")
    .select("*",{count:"exact",head:true});

  document.getElementById("counter").innerText =
    "Teilnehmer: " + (count || 0);
}
loadCount();

// 🔐 CHECK BALANCE
async function checkLIG1(wallet){
  const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

  const contract = new ethers.Contract(
    "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await contract.balanceOf(wallet);
  return Number(balance) / 1e18;
}

// 🚀 PARTICIPATE
async function participate(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet || !wallet.startsWith("0x")){
    alert("Ungültige Wallet");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Prüfe Wallet...";

  try{

    const bal = await checkLIG1(wallet);

    if(bal < 100){
      document.getElementById("result").innerHTML =
        "❌ Du brauchst mindestens 100 LIG1";
      return;
    }

    // speichern
    const { error } = await sb.from("participants").insert([{
      wallet: wallet,
      ref: ref
    }]);

    if(error){
      document.getElementById("result").innerHTML =
        "⚠️ Schon registriert oder Fehler";
      return;
    }

    document.getElementById("result").innerHTML =
      "🔥 Erfolgreich! Jetzt teilen & Chancen erhöhen!";

    loadCount();

  }catch(e){
    console.error(e);
    document.getElementById("result").innerHTML =
      "❌ Fehler bei Prüfung";
  }
}

// 📤 SHARE
function share(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet){
    alert("Erst teilnehmen");
    return;
  }

  const link = location.origin + "?ref=" + wallet;

  const text = "🚀 Ich nehme an der 1M Challenge teil!\n\nMach mit:\n" + link;

  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
