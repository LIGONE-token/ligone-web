<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Shares</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
:root{
--accent:#facc15;
--blue:#2563eb;
--text:#111;
--sub:#ddd;
--border:#e5e7eb;
}

body{
margin:0;
font-family:Inter,system-ui;
color:#fff;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1621761191319-c6fb62004040");

background-size:cover;
background-position:center;
}

/* HEADER */
.header{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
background:rgba(0,0,0,0.6);
}

.header a{
background:#111;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
color:#fff;
font-size:13px;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px 10px;
}

.hero h1{
font-size:64px;
margin:0;
text-shadow:0 0 25px rgba(250,204,21,0.6);
}

.highlight{
color:var(--accent);
}

.hero p{
font-size:20px;
color:#ddd;
}

/* PROGRESS */
.progress-wrap{
max-width:700px;
margin:20px auto;
}

.bar{
height:16px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#facc15,#f59e0b);
}

.progress-text{
margin-top:8px;
font-weight:600;
color:#fff;
}

/* CARD */
.card{
max-width:700px;
margin:30px auto;
background:#fff;
padding:30px;
border-radius:20px;
color:#111;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* SHARE */
.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.share button{
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
background:var(--blue);
color:#fff;
}

/* BUTTON */
.main{
margin-top:15px;
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:14px;
background:var(--accent);
color:#000;
font-weight:800;
cursor:pointer;
}

.buy{
margin-top:15px;
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#16a34a;
color:#fff;
font-weight:800;
cursor:pointer;
}

input{
margin-top:10px;
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--border);
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<a href="https://ligone.ch" target="_blank">Website</a>
<a href="https://app.uniswap.org/#/swap?chain=polygon&outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Buy</a>
</div>

<!-- HERO -->
<div class="hero">
<h1><span class="highlight">1,000,000</span> SHARES</h1>
<p>1 Wallet gewinnt 1,000,000 LIG1</p>

<a href="https://ligone.ch" target="_blank">
<button class="buy">💰 LIG1 kaufen (Anleitung)</button>
</a>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
<div class="bar">
<div class="fill" id="fill"></div>
</div>
<div class="progress-text" id="progressText">
0 / 1,000,000 Teilnehmer
</div>
</div>

<!-- CARD -->
<div class="card">

<p><b>💎 Teilnahme:</b> Wallet + mindestens 100 LIG1</p>
<p>🚀 Mehr Shares = höhere Gewinnchance</p>

<div class="share">
<button onclick="share()">WhatsApp</button>
<button onclick="share()">X / Twitter</button>
</div>

<input id="wallet" placeholder="Wallet Adresse">

<button class="main" onclick="participate()">Teilnahme starten</button>

<div id="result" class="result"></div>

</div>

<script>

let count = 0;

// Progress Demo
setInterval(()=>{
  count += Math.floor(Math.random()*3);
  document.getElementById("progressText").innerText =
    count + " / 1,000,000 Teilnehmer";
  document.getElementById("fill").style.width =
    (count/1000000*100)+"%";
},2000);

// Wallet Check
async function checkLIG1(wallet){

  const provider = new ethers.providers.JsonRpcProvider(
    "https://polygon-rpc.com"
  );

  const contract = new ethers.Contract(
    "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await contract.balanceOf(wallet);
  return Number(balance) / 1e18;
}

// Teilnahme
async function participate(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet || !wallet.startsWith("0x")){
    alert("Ungültige Wallet");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Prüfe Wallet...";

  try{

    const bal = await checkLIG1(wallet);

    if(bal < 100){
      document.getElementById("result").innerHTML =
        "❌ Du brauchst mindestens 100 LIG1";
      return;
    }

    document.getElementById("result").innerHTML =
      "🔥 Erfolgreich! Jetzt teilen & gewinnen 🚀";

  }catch(e){
    document.getElementById("result").innerHTML =
      "❌ Fehler bei Wallet-Prüfung";
  }
}

// Share
function share(){

  const link = location.href;

  const text =
  "🚀 1,000,000 LIG1 Challenge!\n\nMach mit:\n" + link;

  window.open(
    "https://twitter.com/intent/tweet?text="+encodeURIComponent(text)
  );
}

</script>

</body>
</html>
