<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Shares</title>

<meta property="og:title" content="🚀 1,000,000 SHARES">
<meta property="og:description" content="Ich bin Teilnehmer #X – bist du dabei?">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
:root{
--bg:#f9fafb;
--accent:#facc15;
--blue:#2563eb;
--text:#111;
--sub:#6b7280;
--border:#e5e7eb;
}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
}

/* HEADER */
.header{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
background:#fff;
border-bottom:1px solid var(--border);
}

.header a{
background:#f3f4f6;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
color:#111;
font-size:13px;
font-weight:500;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px 10px;
}

.hero h1{
font-size:64px;
margin:0;
}

.highlight{
color:var(--accent);
}

.hero p{
font-size:20px;
color:var(--sub);
}

/* PROGRESS */
.progress-wrap{
max-width:700px;
margin:20px auto;
}

.bar{
height:16px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#facc15,#f59e0b);
transition:width 0.5s;
}

.progress-text{
margin-top:8px;
font-weight:600;
}

/* CARD */
.card{
max-width:700px;
margin:30px auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

/* SHARE */
.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.share button{
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.whatsapp{background:#25D366;color:#000;}
.telegram{background:#0088cc;color:#fff;}
.facebook{background:#1877f2;color:#fff;}
.x{background:#111;color:#fff;}

/* BUTTON */
.main{
margin-top:15px;
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:14px;
background:var(--accent);
color:#000;
font-weight:800;
cursor:pointer;
}

input{
margin-top:10px;
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--border);
}

.hidden{display:none;}

.result{
margin-top:15px;
font-size:22px;
font-weight:bold;
color:#16a34a;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<a href="https://ligone-token.github.io/ligone-web/" target="_blank">Website</a>
<a href="https://www.geckoterminal.com/polygon_pos/pools/0xd6791279b261c36c1e079ece8cb05079cc5e7e38" target="_blank">Chart</a>
<a href="https://polygonscan.com/token/0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Contract</a>
<a href="https://app.uniswap.org/#/swap?chain=polygon&outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d" target="_blank">Buy (POL)</a>
<a href="https://ligone-token.github.io/ligone-web/monitor.html" target="_blank">Monitor</a>
</div>

<!-- HERO -->
<div class="hero">

<h1><span class="highlight">1,000,000</span> SHARES</h1>

<p>1 Wallet gewinnt 1,000,000 LIG1</p>

</div>

<!-- PROGRESS -->
<div class="progress-wrap">

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="progress-text" id="progressText">
0 / 1,000,000 Teilnehmer
</div>

</div>

<!-- CARD -->
<div class="card">

<p><b>Teilnahme:</b> Share + Wallet + ≥100 LIG1</p>

<div class="share">

<button class="whatsapp" onclick="shareWhats()">WhatsApp</button>
<button class="telegram" onclick="shareTG()">Telegram</button>
<button class="facebook" onclick="shareFB()">Facebook</button>
<button class="x" onclick="shareX()">X</button>

</div>

<button id="confirmBtn" class="main hidden" onclick="showWallet()">
👉 Ich habe geteilt
</button>

<div id="walletBox" class="hidden">

<input id="wallet" placeholder="Wallet Adresse">

<button class="main" onclick="participate()">Teilnahme starten</button>

</div>

<div id="result" class="result"></div>

</div>

<script>

const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2Pp3aqbNBw_IXwHo2fD"
);

let shared=false;
let lastCount=0;

const url=location.href;
const text="🚀 1,000,000 SHARES CHALLENGE ";

function shareWhats(){window.open("https://wa.me/?text="+encodeURIComponent(text+url));enable();}
function shareTG(){window.open("https://t.me/share/url?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text));enable();}
function shareFB(){window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url));enable();}
function shareX(){window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text+url));enable();}

function enable(){
shared=true;
document.getElementById("confirmBtn").style.display="block";
}

function showWallet(){
if(!shared){alert("Bitte zuerst teilen");return;}
document.getElementById("walletBox").style.display="block";
}

// COUNT + PROGRESS
async function loadCount(){
const {count}=await supabase
.from("lig1_campaign_participants")
.select("*",{count:"exact",head:true});

lastCount=count||0;

document.getElementById("progressText").innerText =
lastCount.toLocaleString()+" / 1,000,000 Teilnehmer";

document.getElementById("fill").style.width =
(lastCount/1000000*100)+"%";
}

setInterval(loadCount,5000);
loadCount();

// PARTICIPATE (gekürzt)
async function participate(){
document.getElementById("result").innerHTML =
"🔥 Du bist Teilnehmer #"+(lastCount+1);

shareAfterJoin(lastCount+1);
}

// VIRAL SHARE
function shareAfterJoin(n){
const t="🔥 Ich bin Teilnehmer #"+n+" der 1M Challenge!\n\nBist du dabei?\n\n";
window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(t+url));
}

</script>

</body>
</html>
