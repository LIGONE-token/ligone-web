👉 Ich habe geteilt – Teilnahme aktivieren
</button>

<script>

const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

const LIG1 = "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d";
const PAIR = "0xd6791279b261c36c1e079ece8cb05079cc5e7e38";

function startShare() {
  const url = window.location.href;

  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent("🚀 Gewinne 1.000.000 LIG1! " + url),
    "_blank"
  );

  document.getElementById("confirmBtn").classList.remove("hidden");
}

// WALLET CHECK
async function checkWallet(wallet) {
  const contract = new ethers.Contract(
    LIG1,
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await contract.balanceOf(wallet);
  return parseFloat(ethers.utils.formatUnits(balance,18)) >= 100;
}

// CONFIRM
async function confirmShare() {

  const wallet = document.getElementById("wallet").value;

  if (!wallet) return alert("Wallet eingeben!");

  const valid = await checkWallet(wallet);
  if (!valid) return alert("Mindestens 100 LIG1 nötig!");

  await supabase
    .from("lig1_campaign_participants")
    .insert([{ wallet }]);

  update();
}

// LIVE JACKPOT
async function getJackpot() {

  try {

    const pair = new ethers.Contract(
      PAIR,
      [
        "function getReserves() view returns (uint112,uint112,uint32)",
        "function token0() view returns (address)"
      ],
      provider
    );

    const [r0, r1] = await pair.getReserves();
    const token0 = await pair.token0();

    let lig1Reserve, polReserve;

    if (token0.toLowerCase() === LIG1.toLowerCase()) {
      lig1Reserve = parseFloat(ethers.utils.formatUnits(r0,18));
      polReserve = parseFloat(ethers.utils.formatUnits(r1,18));
    } else {
      lig1Reserve = parseFloat(ethers.utils.formatUnits(r1,18));
      polReserve = parseFloat(ethers.utils.formatUnits(r0,18));
    }

    const pricePOL = polReserve / lig1Reserve;

    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=matic-network&vs_currencies=usd",
      { cache: "no-store" }
    );

    const data = await res.json();

    const value = 1000000 * pricePOL * data["matic-network"].usd;

    if (value > 0) return value;

  } catch(e) {}

  return 17;
}

// UPDATE
async function update() {

  const { count } = await supabase
    .from("lig1_campaign_participants")
    .select("*",{count:"exact",head:true});

  const shares = count || 0;
  const left = 1000000 - shares;

  const jackpot = await getJackpot();

  document.getElementById("counter").innerText =
    shares.toLocaleString() + " Shares";

  document.getElementById("left").innerText =
    left.toLocaleString();

  document.getElementById("usd").innerText =
    "$" + jackpot.toFixed(2);
}

// LOOP
setInterval(update,8000);
update();

</script>
