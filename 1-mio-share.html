<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Shares</title>

<!-- ✅ PREVIEW -->
<meta property="og:title" content="🚀 1,000,000 SHARES">
<meta property="og:description" content="Wenn wir 1 Mio Shares erreichen → 1 Wallet gewinnt 1,000,000 LIG1">
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg">
<meta property="og:url" content="https://ligone-token.github.io/ligone-web/">
<meta property="og:type" content="website">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
:root{
--accent:#facc15;
--blue:#2563eb;
--border:#e5e7eb;
}

body{
margin:0;
font-family:Inter,system-ui;
color:#fff;

background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://images.unsplash.com/photo-1621761191319-c6fb62004040");

background-size:cover;
background-position:center;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:60px;
margin:0;
text-shadow:0 0 25px rgba(250,204,21,0.6);
}

.highlight{
color:#facc15;
}

.hero p{
font-size:20px;
color:#ddd;
}

.card{
max-width:600px;
margin:20px auto;
background:#fff;
color:#111;
padding:25px;
border-radius:16px;
}

button{
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.main{
background:#facc15;
width:100%;
margin-top:10px;
}

.buy{
background:#16a34a;
color:#fff;
width:100%;
margin-top:15px;
}

.share{
background:#2563eb;
color:#fff;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.result{
margin-top:15px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="hero">
<h1><span class="highlight">1,000,000</span> SHARES</h1>

<p>
Wenn wir 1 Million Shares erreichen:<br>
🎁 gewinnt 1 Wallet → 1,000,000 LIG1
</p>

<a href="https://ligone.ch" target="_blank">
<button class="buy">💰 LIG1 kaufen</button>
</a>

</div>

<div class="card">

<p><b>💎 Teilnahme:</b></p>
<p>
1. Halte mindestens 100 LIG1<br>
2. Trage deine Wallet ein<br>
3. Teile die Seite
</p>

<p style="color:red;">
⚠️ Nur Shares zählen als Teilnahme
</p>

<input id="wallet" placeholder="Deine Wallet Adresse">

<button class="main" onclick="participate()">Teilnahme starten</button>

<button class="share" onclick="shareWhats()">📤 Jetzt teilen</button>

<div id="result" class="result"></div>

</div>

<script>

// 🔐 CHECK
async function checkLIG1(wallet){

  const provider = new ethers.providers.JsonRpcProvider(
    "https://polygon-rpc.com"
  );

  const contract = new ethers.Contract(
    "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d",
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await contract.balanceOf(wallet);
  return Number(balance) / 1e18;
}

// 🚀 PARTICIPATE
async function participate(){

  const wallet = document.getElementById("wallet").value;

  if(!wallet || !wallet.startsWith("0x")){
    alert("Ungültige Wallet");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Prüfe...";

  try{

    const bal = await checkLIG1(wallet);

    if(bal < 100){
      document.getElementById("result").innerHTML =
        "❌ Mindestens 100 LIG1 erforderlich";
      return;
    }

    document.getElementById("result").innerHTML =
      "🔥 Du bist dabei!<br><br>" +
      "⚠️ Deine Teilnahme zählt nur, wenn du teilst.<br><br>" +
      "🚀 Öffne jetzt WhatsApp & teile!";

    // 🔥 AUTO SHARE
    setTimeout(shareWhats, 1000);

  }catch(e){
    document.getElementById("result").innerHTML =
      "❌ Fehler bei Prüfung";
  }
}

// 📤 SHARE
function shareWhats(){

  const text =
  "🚀 1,000,000 SHARES Challenge!\n\n" +
  "Wenn wir das schaffen:\n" +
  "🎁 1 Wallet gewinnt 1,000,000 LIG1\n\n" +
  "Mach mit:\n" + location.href;

  window.open(
    "https://wa.me/?text=" + encodeURIComponent(text)
  );
}

</script>

</body>
</html>
