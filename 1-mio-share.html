<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>1 Million Shares Challenge – LIG1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Halte ≥100 LIG1, teile öffentlich und gewinne 1,000,000 LIG1." />

<meta property="og:title" content="🚀 1 Million Shares Challenge" />
<meta property="og:description" content="Gewinne 1,000,000 LIG1 – wenn wir 1 Mio Shares erreichen." />
<meta property="og:image" content="https://ligone-token.github.io/ligone-web/preview-1-mio-share.jpg" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  max-width: 420px;
  width: 90%;
}

.counter {
  font-size: 32px;
  font-weight: bold;
}

.usd {
  color: #666;
}

.buy {
  margin-top: 15px;
  display: block;
  background: #00c853;
  padding: 12px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 1 Million Shares</h1>
<p>Halte ≥100 LIG1 und poste öffentlich</p>

<div class="counter" id="counter">0 / 1,000,000</div>
<div class="usd" id="usd">≈ $0.00</div>

<p><b>💰 Jackpot: 1,000,000 LIG1</b></p>

<!-- 🔥 DIREKT KAUFEN -->
<a class="buy" href="https://app.uniswap.org/#/swap?outputCurrency=0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d&chain=polygon" target="_blank">
→ LIG1 auf Uniswap kaufen
</a>

<br>

<input id="wallet" placeholder="Wallet Adresse" />
<input id="share" placeholder="Link zu deinem Social Post" />

<button onclick="join()">Teilnehmen</button>

</div>

<script>

// 🔑 SUPABASE
const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
);

// 🔗 BLOCKCHAIN
const provider = new ethers.providers.JsonRpcProvider("https://polygon-rpc.com");

// 🔥 FIXE DATEN (ECHT)
const LIG1 = "0x92b3677ae2ea7c19aa4fa56936d11be99bcac37d";
const PAIR = "0xd6791279b261c36c1e079ece8cb05079cc5e7e38";

const ABI = [
"function getReserves() view returns (uint112,uint112,uint32)",
"function token0() view returns (address)",
"function balanceOf(address) view returns (uint256)"
];

// 📊 SHARES
async function getShares() {
  const { count } = await supabase
    .from("lig1_campaign_participants")
    .select("*", { count: "exact", head: true });

  return count || 0;
}

// 💰 PREIS (ECHT AUS POOL)
async function getPrice() {
  const pair = new ethers.Contract(PAIR, ABI, provider);
  const [r0, r1] = await pair.getReserves();
  const token0 = await pair.token0();

  let lig1Reserve, polReserve;

  if (token0.toLowerCase() === LIG1.toLowerCase()) {
    lig1Reserve = r0;
    polReserve = r1;
  } else {
    lig1Reserve = r1;
    polReserve = r0;
  }

  const pricePOL = (polReserve / 1e18) / (lig1Reserve / 1e18);

  // POL → USD
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=matic-network&vs_currencies=usd");
  const data = await res.json();

  return pricePOL * data["matic-network"].usd;
}

// 🔄 UPDATE
async function update() {
  const shares = await getShares();
  const price = await getPrice();

  const usd = shares * price;

  document.getElementById("counter").innerText =
    shares.toLocaleString() + " / 1,000,000";

  document.getElementById("usd").innerText =
    "≈ $" + usd.toFixed(6);
}

// ➕ TEILNAHME
async function join() {
  const wallet = document.getElementById("wallet").value;
  const link = document.getElementById("share").value;

  if (!wallet || !link) return alert("Alles ausfüllen!");

  // Balance prüfen
  const contract = new ethers.Contract(LIG1, ABI, provider);
  const balance = (await contract.balanceOf(wallet)) / 1e18;

  if (balance < 100) return alert("Mindestens 100 LIG1 nötig!");

  // speichern
  const { error } = await supabase
    .from("lig1_campaign_participants")
    .insert([{ wallet }]);

  if (error) return alert("Wallet existiert!");

  update();
}

// START
update();
setInterval(update, 15000);

</script>

</body>
</html>
